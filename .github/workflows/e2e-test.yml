name: E2E Tests

on:
  workflow_run:
    workflows: ["Build and Release ZecKit CLI"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      version:
        description: 'Version to test'
        required: true
        default: '0.1.0'

jobs:
  e2e-tests:
    name: ZecKit E2E Test Suite
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Download prebuilt CLI instead of compiling 279 crates
      # ----------------------------------------------------------
      - name: Download ZecKit CLI binary
        run: |
          set -euo pipefail

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Downloading ZecKit CLI"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          mkdir -p bin

          REPO="${{ github.repository }}"

          # Extract tag from workflow_run event
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            REF="${{ github.event.workflow_run.ref }}"
            TAG="${REF#refs/tags/}"
          fi

          echo "Resolved tag: $TAG"
          echo "Repository: $REPO"

          sudo apt-get update -y
          sudo apt-get install -y jq

          echo "Waiting for release $TAG to become available..."

          for i in {1..30}; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${REPO}/releases/tags/${TAG})

            if echo "$RESPONSE" | jq -e '.assets' >/dev/null 2>&1; then
              echo "Release found."
              RELEASE_JSON="$RESPONSE"
              break
            fi

            echo "Release not ready yet... retrying in 10 seconds"
            sleep 10
          done

          if [ -z "${RELEASE_JSON:-}" ]; then
            echo "Release never became available."
            exit 1
          fi

          # Extract asset IDs
          BIN_ASSET_ID=$(echo "$RELEASE_JSON" | jq -r \
            '.assets[] | select(.name=="zeckit-linux-x86_64") | .id')

          SHA_ASSET_ID=$(echo "$RELEASE_JSON" | jq -r \
            '.assets[] | select(.name=="zeckit-linux-x86_64.sha256") | .id')

          if [ -z "$BIN_ASSET_ID" ] || [ -z "$SHA_ASSET_ID" ]; then
            echo "Required assets not found in release."
            exit 1
          fi

          echo "Binary Asset ID: $BIN_ASSET_ID"
          echo "Checksum Asset ID: $SHA_ASSET_ID"

          # Download binary
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            https://api.github.com/repos/${REPO}/releases/assets/${BIN_ASSET_ID} \
            -o bin/zeckit-linux-x86_64

          # Download checksum
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            https://api.github.com/repos/${REPO}/releases/assets/${SHA_ASSET_ID} \
            -o bin/zeckit-linux-x86_64.sha256

          cd bin

          echo "Verifying checksum..."
          sha256sum -c zeckit-linux-x86_64.sha256

          chmod +x zeckit-linux-x86_64
          mv zeckit-linux-x86_64 zeckit

          cd ..

          echo "✓ CLI downloaded and verified"
          ls -lh bin/zeckit
          echo ""
          
      - name: Check environment
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Environment Check"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          docker --version
          docker compose version
          echo ""

      - name: Clean up previous runs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Cleaning Up Previous Runs"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          docker compose down 2>/dev/null || true

          docker volume rm zeckit_zebra-data 2>/dev/null || true
          docker volume rm zeckit_zebra-sync-data 2>/dev/null || true
          docker volume rm zeckit_zaino-data 2>/dev/null || true
          docker volume rm zeckit_lightwalletd-data 2>/dev/null || true
          docker volume rm zeckit_faucet-data 2>/dev/null || true

          docker compose down --remove-orphans 2>/dev/null || true

          echo "✓ Cleanup complete"
          echo ""

      - name: Start devnet with zaino backend
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Starting ZecKit Devnet"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          ./bin/zeckit up --backend zaino &
          PID=$!

          SECONDS=0
          MAX_SECONDS=3600

          while kill -0 $PID 2>/dev/null && [ $SECONDS -lt $MAX_SECONDS ]; do
            sleep 30
            ELAPSED_MIN=$((SECONDS / 60))
            echo "⏱️  Starting devnet... ($ELAPSED_MIN minutes elapsed)"
          done

          if kill -0 $PID 2>/dev/null; then
            echo "✗ Devnet startup timed out"
            kill $PID 2>/dev/null || true
            docker compose logs || true
            exit 1
          fi

          wait $PID
          EXIT_CODE=$?

          if [ $EXIT_CODE -ne 0 ]; then
            echo "✗ Devnet startup failed!"
            docker compose logs || true
            exit 1
          fi

          echo ""
          echo "✓ Devnet started successfully"
          echo ""

      - name: Run smoke tests
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Running Smoke Tests"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          ./bin/zeckit test

          TEST_EXIT_CODE=$?

          echo ""
          if [ $TEST_EXIT_CODE -eq 0 ]; then
            echo "✓ All smoke tests PASSED!"
          else
            echo "✗ Smoke tests FAILED!"
            exit 1
          fi
          echo ""

      - name: Check wallet balance
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Wallet Status"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          docker exec zeckit-zingo-wallet bash -c \
            "echo -e 'balance\nquit' | zingo-cli --data-dir /var/zingo --server http://zaino:9067 --chain regtest --nosync" \
            2>/dev/null || echo "Could not retrieve balance"
          echo ""

      - name: Check faucet status
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Faucet Status"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          curl -s http://127.0.0.1:8080/stats | jq . || echo "Could not get faucet stats"
          echo ""

      - name: Collect logs
        if: always()
        run: |
          echo "Collecting logs for artifact..."
          mkdir -p logs

          docker compose logs zebra-miner > logs/zebra-miner.log 2>&1 || true
          docker compose logs zebra-sync > logs/zebra-sync.log 2>&1 || true
          docker compose logs zaino > logs/zaino.log 2>&1 || true
          docker compose logs faucet-zaino > logs/faucet.log 2>&1 || true
          docker ps -a > logs/containers.log 2>&1 || true
          docker network ls > logs/networks.log 2>&1 || true

          echo "✓ Logs collected"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Cleanup"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          docker compose down --remove-orphans 2>/dev/null || true
          echo "✓ Cleanup complete"
          echo ""

      - name: Test summary
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  E2E Test Execution Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          if [ "${{ job.status }}" == "success" ]; then
            echo "✓ Status: ALL TESTS PASSED ✓"
          else
            echo "✗ Status: TESTS FAILED ✗"
            echo "Artifact logs: e2e-test-logs-${{ github.run_number }}"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""